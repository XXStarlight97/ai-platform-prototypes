<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材管理 - 智岩 AI 平台</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
        mono: ['JetBrains Mono', 'SF Mono', 'Consolas', 'monospace']
      },
      colors: {
        primary: { DEFAULT: '#f59e0b', hover: '#fbbf24', active: '#d97706' },
        bg: { base: '#0a0a0c', elevated: '#16161e', glass: 'rgba(255, 255, 255, 0.06)' },
        border: { default: 'rgba(255, 255, 255, 0.10)', light: 'rgba(255, 255, 255, 0.05)' },
        text: { primary: 'rgba(255, 255, 255, 0.92)', secondary: 'rgba(255, 255, 255, 0.64)', tertiary: 'rgba(255, 255, 255, 0.42)' }
      }
    }
  }
}
</script>

<style>
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

.fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease, transform 0.2s ease; }
.fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(4px); }
[v-cloak] { display: none; }
</style>
</head>
<body class="bg-bg-base text-text-primary h-screen w-screen overflow-hidden selection:bg-primary/30">

<div id="app" class="h-full w-full flex flex-col relative" v-cloak>

  <!-- Ambient -->
  <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[50vw] h-[50vw] bg-indigo-600/10 rounded-full blur-[120px] mix-blend-screen"></div>
    <div class="absolute top-[20%] right-[-10%] w-[40vw] h-[40vw] bg-amber-600/10 rounded-full blur-[120px] mix-blend-screen"></div>
    <div class="absolute -bottom-[20%] left-[20%] w-[60vw] h-[60vw] bg-purple-600/5 rounded-full blur-[150px] mix-blend-screen"></div>
  </div>

  <!-- AppHeader -->
  <header class="h-[48px] shrink-0 border-b border-border-default flex items-center justify-between px-4 z-50 relative bg-bg-base/40 backdrop-blur-sm">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2 pr-4 border-r border-border-default">
        <div class="w-7 h-7 rounded bg-primary flex items-center justify-center text-bg-base font-bold text-sm">
          <i class="ph-bold ph-cube"></i>
        </div>
        <span class="font-bold text-[15px] tracking-wide">智岩 AI</span>
      </div>
      <div class="flex items-center gap-1">
        <div class="h-[30px] px-3 flex items-center gap-2 rounded-md text-[13px] transition-colors cursor-pointer max-w-[220px] border bg-primary/10 text-text-primary border-primary/25">
          <i class="ph-duotone ph-folder-star"></i>
          <span class="truncate">素材管理</span>
          <button class="w-4 h-4 rounded hover:bg-white/10 flex items-center justify-center opacity-60 hover:opacity-100 transition-opacity">
            <i class="ph ph-x text-[10px]"></i>
          </button>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-text-secondary hover:text-text-primary transition-colors">
        <i class="ph ph-moon text-lg"></i>
      </button>
      <div class="w-7 h-7 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-xs font-semibold shadow-inner border border-white/20">管</div>
    </div>
  </header>

  <!-- PageChrome -->
  <main class="flex-1 overflow-hidden p-[10px_12px_12px] relative z-10 flex">
    <div class="flex-1 bg-bg-glass backdrop-blur-[12px] border border-border-default rounded-[14px] overflow-hidden flex shadow-lg shadow-black/50 ring-1 ring-white/5 relative">

      <!-- ======================== -->
      <!-- Left: Navigation (240px) -->
      <!-- ======================== -->
      <div class="w-[240px] shrink-0 border-r border-border-light flex flex-col overflow-hidden bg-white/[0.01]">
        
        <div class="p-4 border-b border-border-light">
          <button @click="triggerUpload" class="w-full h-[36px] rounded-lg bg-primary hover:bg-primary-hover active:bg-primary-active text-bg-base text-[13px] font-semibold transition-all flex items-center justify-center gap-2 shadow-[0_0_12px_rgba(245,158,11,0.2)] hover:shadow-[0_0_16px_rgba(245,158,11,0.4)]">
            <i class="ph-bold ph-upload-simple"></i>上传素材
          </button>
          <input type="file" ref="fileInput" class="hidden" multiple accept="image/*,video/*" @change="handleFileUpload">
        </div>

        <div class="p-3 flex flex-col gap-1">
          <div class="text-[11px] font-semibold text-text-tertiary px-3 py-2 uppercase tracking-wider">视图</div>
          
          <button @click="currentView = 'sku'" 
                  class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] transition-colors"
                  :class="currentView === 'sku' ? 'bg-primary/10 text-primary font-medium' : 'text-text-secondary hover:bg-white/[0.04] hover:text-text-primary'">
            <i class="ph-fill ph-stack text-lg"></i>
            SKU 资产总览
          </button>

          <button @click="currentView = 'all'" 
                  class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-[13px] transition-colors"
                  :class="currentView === 'all' ? 'bg-primary/10 text-primary font-medium' : 'text-text-secondary hover:bg-white/[0.04] hover:text-text-primary'">
            <i class="ph-fill ph-squares-four text-lg"></i>
            全部素材库
          </button>
        </div>

        <div class="mt-auto p-3 border-t border-border-light">
          <div class="flex items-center justify-between px-3 py-2 rounded-lg bg-black/20 border border-border-default cursor-pointer hover:border-border-default/80">
            <div class="flex items-center gap-2">
              <div class="w-6 h-6 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center text-xs">
                <i class="ph-fill ph-users"></i>
              </div>
              <span class="text-xs text-text-secondary">团队素材</span>
            </div>
            <i class="ph ph-caret-up text-text-tertiary text-xs"></i>
          </div>
        </div>

      </div>

      <!-- ======================== -->
      <!-- Right: Content Area -->
      <!-- ======================== -->
      <div class="flex-1 flex flex-col overflow-hidden min-w-0 bg-bg-elevated/30">

        <!-- ========================================== -->
        <!-- VIEW: SKU 资产总览 -->
        <!-- ========================================== -->
        <template v-if="currentView === 'sku'">
          
          <template v-if="!selectedSku">
            <!-- Header -->
            <div class="h-[60px] border-b border-border-default flex items-center px-6 justify-between shrink-0 bg-white/[0.02]">
              <span class="text-[15px] font-semibold text-text-primary">SKU 资产总览</span>
              <div class="relative w-[280px]">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-text-tertiary"></i>
                <input type="text" placeholder="搜索 SKU / 商品名称"
                       class="w-full h-[32px] bg-black/20 border border-border-default rounded-lg pl-9 pr-3 text-[13px] outline-none focus:border-primary/50 transition-all placeholder-text-tertiary">
              </div>
            </div>

            <!-- List -->
            <div class="flex-1 overflow-y-auto p-6">
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                
                <div v-for="sku in mockSkus" :key="sku.id"
                     @click="selectedSku = sku"
                     class="bg-black/20 border border-border-default rounded-xl p-5 cursor-pointer hover:border-primary/40 hover:-translate-y-1 hover:shadow-lg transition-all duration-200 group">
                  <div class="flex justify-between items-start mb-4">
                    <div>
                      <div class="text-[15px] font-semibold text-text-primary mb-1 group-hover:text-primary transition-colors">{{ sku.code }}</div>
                      <div class="text-xs text-text-secondary">{{ sku.name }}</div>
                    </div>
                    <div class="w-10 h-10 rounded bg-black/40 flex items-center justify-center shrink-0">
                      <i class="ph-duotone ph-package text-text-tertiary text-xl"></i>
                    </div>
                  </div>
                  
                  <div class="flex flex-col gap-3">
                    <div class="flex justify-between items-center text-xs">
                      <span class="text-text-tertiary">资产覆盖率</span>
                      <span class="font-medium" :class="sku.coverage === '100%' ? 'text-green-500' : 'text-amber-500'">{{ sku.coverage }}</span>
                    </div>
                    <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                      <div class="h-full rounded-full" :class="sku.coverage === '100%' ? 'bg-green-500' : 'bg-amber-500'" :style="{ width: sku.coverage }"></div>
                    </div>
                    
                    <div class="flex gap-2 mt-2">
                      <span class="px-2 py-1 rounded bg-green-500/10 text-green-500 text-[10px] font-medium border border-green-500/20">{{ sku.stats.passed }} 定版/通过</span>
                      <span class="px-2 py-1 rounded bg-red-500/10 text-red-500 text-[10px] font-medium border border-red-500/20" v-if="sku.stats.rejected">{{ sku.stats.rejected }} 需修改</span>
                      <span class="px-2 py-1 rounded bg-blue-500/10 text-blue-500 text-[10px] font-medium border border-blue-500/20" v-if="sku.stats.pending">{{ sku.stats.pending }} 待审</span>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </template>

          <template v-else>
            <!-- SKU Detail Header -->
            <div class="h-[60px] border-b border-border-default flex items-center px-6 justify-between shrink-0 bg-white/[0.02]">
              <div class="flex items-center gap-4">
                <button @click="selectedSku = null" class="w-8 h-8 rounded-full hover:bg-white/10 flex items-center justify-center text-text-secondary hover:text-text-primary transition-colors">
                  <i class="ph ph-arrow-left text-lg"></i>
                </button>
                <div class="w-[1px] h-4 bg-border-default"></div>
                <div>
                  <span class="text-[15px] font-semibold text-text-primary mr-2">{{ selectedSku.code }}</span>
                  <span class="text-xs text-text-secondary">{{ selectedSku.name }}</span>
                </div>
              </div>
              <div class="flex gap-3">
                <button class="h-[32px] px-4 rounded-lg bg-white/5 hover:bg-white/10 border border-border-default text-[13px] transition-colors flex items-center gap-2">
                  <i class="ph ph-magic-wand"></i>新建适配
                </button>
                <button class="h-[32px] px-4 rounded-lg bg-primary/10 hover:bg-primary/20 text-primary border border-primary/20 text-[13px] font-medium transition-colors flex items-center gap-2">
                  <i class="ph ph-check-circle"></i>发起审核
                </button>
              </div>
            </div>

            <div class="flex-1 overflow-y-auto p-6">
              
              <!-- Tabs inside SKU -->
              <div class="flex border-b border-border-light mb-6">
                <button class="px-4 py-3 text-[13px] font-medium border-b-2 transition-colors border-primary text-primary">资产库 (可复用)</button>
                <button class="px-4 py-3 text-[13px] font-medium border-b-2 transition-colors border-transparent text-text-secondary hover:text-text-primary">审核任务记录 (包含临时图)</button>
              </div>

              <!-- Assets grouped by Type -->
              <div class="flex flex-col gap-8">
                
                <div v-for="group in mockSkuAssets" :key="group.type" class="flex flex-col gap-4">
                  <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                      <h3 class="text-sm font-semibold text-text-primary">{{ group.type }}</h3>
                      <span class="text-xs text-text-tertiary">{{ group.images.length }} 个资产</span>
                    </div>
                  </div>

                  <div class="grid grid-cols-4 xl:grid-cols-5 gap-4">
                    <div v-for="img in group.images" :key="img.id"
                         class="bg-black/20 border border-border-default rounded-xl p-3 hover:border-primary/40 transition-all duration-200 group relative">
                      
                      <div class="w-full aspect-[1.2] bg-black/40 rounded-lg mb-3 flex items-center justify-center relative overflow-hidden">
                        <i class="ph ph-image text-text-tertiary text-2xl"></i>
                        <!-- Hover Actions -->
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2 backdrop-blur-[2px]">
                          <button class="w-8 h-8 rounded-full bg-primary text-bg-base flex items-center justify-center hover:scale-110 transition-transform" title="基于此适配">
                            <i class="ph-bold ph-magic-wand"></i>
                          </button>
                          <button class="w-8 h-8 rounded-full bg-white/20 text-white flex items-center justify-center hover:scale-110 hover:bg-white/30 transition-transform" title="查看详情">
                            <i class="ph-bold ph-eye"></i>
                          </button>
                        </div>
                      </div>
                      
                      <div class="text-[12px] font-medium text-text-primary truncate mb-1.5">{{ img.name }}</div>
                      
                      <div class="flex items-center justify-between">
                        <span class="text-[10px] px-1.5 py-0.5 rounded" :class="statusClass(img.status)">{{ statusText(img.status) }}</span>
                        <span class="text-[10px] text-text-tertiary">{{ img.date }}</span>
                      </div>
                    </div>

                    <!-- Empty Slot -->
                    <div class="border-2 border-dashed border-border-default rounded-xl p-3 flex flex-col items-center justify-center gap-2 text-text-tertiary hover:text-text-secondary hover:border-border-default/80 cursor-pointer transition-colors min-h-[160px]">
                      <i class="ph ph-plus text-xl"></i>
                      <span class="text-xs">添加 {{ group.type }}</span>
                    </div>
                  </div>
                </div>

              </div>

            </div>
          </template>

        </template>

        <!-- ========================================== -->
        <!-- VIEW: 全部素材库 -->
        <!-- ========================================== -->
        <template v-if="currentView === 'all'">
          <!-- Filter Bar -->
          <div class="p-4 border-b border-border-default bg-white/[0.02] flex flex-col gap-4 shrink-0">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3">
                <div class="flex items-center gap-2">
                  <span class="text-[13px] text-text-secondary">图需类型</span>
                  <select class="h-[30px] bg-black/20 border border-border-default rounded-lg px-2 text-[12px] text-text-primary outline-none">
                    <option>全部类型</option>
                    <option>主图</option>
                    <option>SDC</option>
                    <option>Banner</option>
                  </select>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[13px] text-text-secondary">状态</span>
                  <select class="h-[30px] bg-black/20 border border-border-default rounded-lg px-2 text-[12px] text-text-primary outline-none">
                    <option>全部状态</option>
                    <option>已定版</option>
                    <option>审核通过</option>
                    <option>需修改</option>
                  </select>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-[13px] text-text-secondary">来源</span>
                  <select class="h-[30px] bg-black/20 border border-border-default rounded-lg px-2 text-[12px] text-text-primary outline-none">
                    <option>全部来源</option>
                    <option>图像生成</option>
                    <option>镜头生成</option>
                    <option>素材适配</option>
                    <option>本地上传</option>
                  </select>
                </div>
              </div>
              <div class="relative w-[240px]">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-text-tertiary"></i>
                <input type="text" placeholder="搜索文件名称 / SKU"
                       class="w-full h-[30px] bg-black/20 border border-border-default rounded-lg pl-9 pr-3 text-[12px] outline-none focus:border-primary/50 transition-all placeholder-text-tertiary">
              </div>
            </div>
          </div>

          <!-- Grid -->
          <div class="flex-1 overflow-y-auto p-6">
            <div class="grid grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-4">
              <div v-for="img in mockAllAssets" :key="img.id"
                   class="bg-black/20 border border-border-default rounded-xl p-3 hover:border-primary/40 transition-all duration-200 group">
                <div class="w-full aspect-square bg-black/40 rounded-lg mb-3 flex items-center justify-center relative">
                  <i class="ph ph-image text-text-tertiary text-2xl"></i>
                </div>
                <div class="text-[12px] font-medium text-text-primary truncate mb-1">{{ img.name }}</div>
                <div class="text-[10px] text-text-secondary mb-2 flex items-center gap-1.5 truncate">
                  <span class="text-amber-500 bg-amber-500/10 px-1 rounded">{{ img.sku }}</span>
                  <span class="text-text-tertiary">•</span>
                  <span>{{ img.type }}</span>
                </div>
                <div class="flex items-center justify-between">
                  <span class="text-[10px] px-1.5 py-0.5 rounded" :class="statusClass(img.status)">{{ statusText(img.status) }}</span>
                  <i class="ph ph-dots-three text-text-tertiary cursor-pointer hover:text-text-primary"></i>
                </div>
              </div>
            </div>
          </div>
        </template>

      </div><!-- /right -->
    </div>
  </main>

</div>

<script>
const { createApp, ref } = Vue;

createApp({
  setup() {
    const currentView = ref('sku'); // 'sku' | 'all'
    const selectedSku = ref(null);

    const mockSkus = ref([
      { id: 1, code: 'LMP-001', name: '智能落地灯 V2', coverage: '80%', stats: { passed: 12, rejected: 2, pending: 1 } },
      { id: 2, code: 'LMP-002', name: '护眼学习台灯', coverage: '100%', stats: { passed: 8, rejected: 0, pending: 0 } },
      { id: 3, code: 'FAN-001', name: '无叶静音风扇', coverage: '40%', stats: { passed: 2, rejected: 5, pending: 0 } },
      { id: 4, code: 'BRD-GEN', name: '品牌通用', coverage: '65%', stats: { passed: 5, rejected: 1, pending: 3 } }
    ]);

    const mockSkuAssets = ref([
      {
        type: '主图',
        images: [
          { id: 101, name: 'LMP-001_Main_White.jpg', status: 'final', date: '2026-06-24' },
          { id: 102, name: 'LMP-001_Main_Black.jpg', status: 'passed', date: '2026-06-23' },
          { id: 103, name: 'LMP-001_Main_Scene.jpg', status: 'rejected', date: '2026-06-22' }
        ]
      },
      {
        type: 'SDC',
        images: [
          { id: 201, name: 'SDC_1200x628_EN.jpg', status: 'final', date: '2026-06-24' },
          { id: 202, name: 'SDC_1200x628_DE.jpg', status: 'final', date: '2026-06-24' },
          { id: 203, name: 'SDC_300x600_EN.jpg', status: 'pending', date: '2026-06-24' }
        ]
      },
      {
        type: '卖点图',
        images: []
      }
    ]);

    const mockAllAssets = ref([
      { id: 1, name: 'LMP-001_Main_White.jpg', sku: 'LMP-001', type: '主图', status: 'final' },
      { id: 2, name: 'SDC_1200x628_EN.jpg', sku: 'LMP-001', type: 'SDC', status: 'final' },
      { id: 3, name: 'LMP-001_Main_Scene.jpg', sku: 'LMP-001', type: '主图', status: 'rejected' },
      { id: 4, name: 'FAN_Banner_Summer.png', sku: 'FAN-001', type: 'Banner', status: 'passed' },
      { id: 5, name: 'DeskLamp_Hero.webp', sku: 'LMP-002', type: 'KV / 场景图', status: 'final' },
      { id: 6, name: 'Brand_Logo_Grid.jpg', sku: 'BRD-GEN', type: '品牌Paid', status: 'pending' },
    ]);

    function statusClass(s) {
      const map = {
        'final': 'bg-green-500/20 text-green-500 border border-green-500/30 font-medium',
        'passed': 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20',
        'rejected': 'bg-red-500/15 text-red-500 border border-red-500/20',
        'pending': 'bg-blue-500/15 text-blue-400 border border-blue-500/20',
        'draft': 'bg-white/10 text-text-tertiary border border-white/10'
      };
      return map[s] || map['draft'];
    }

    function statusText(s) {
      const map = {
        'final': '已定版',
        'passed': '审核通过',
        'rejected': '需修改',
        'pending': '待审核',
        'draft': '草稿'
      };
      return map[s] || s;
    }

    return {
      currentView, selectedSku,
      mockSkus, mockSkuAssets, mockAllAssets,
      statusClass, statusText
    };
  }
}).mount('#app');
</script>
</body>
</html>
