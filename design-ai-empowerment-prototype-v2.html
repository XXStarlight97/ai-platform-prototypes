<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智岩 AI 平台 · 设计 AI 赋能 v2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <script>
    tailwind.config = {
      darkMode:'class',
      theme:{ extend:{
        fontFamily:{ sans:['Inter','-apple-system','BlinkMacSystemFont','Segoe UI','PingFang SC','Microsoft YaHei','sans-serif'] },
        colors:{ primary:{ DEFAULT:'#f59e0b', hover:'#fbbf24', active:'#d97706' } },
        boxShadow:{ 'glow-primary':'0 0 16px rgba(245,158,11,0.25)' },
      }},
    };
  </script>

  <style>
    [v-cloak]{display:none!important}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#0a0a0c;color:rgba(255,255,255,0.92);overflow:hidden;height:100vh}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:3px}

    .ambient-blobs{position:fixed;inset:0;z-index:0;pointer-events:none}
    .blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.30}
    .blob-1{width:600px;height:600px;background:radial-gradient(circle,rgba(245,158,11,0.10),transparent);top:-250px;right:-150px}
    .blob-2{width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.08),transparent);bottom:-200px;left:-100px}
    .blob-3{width:400px;height:400px;background:radial-gradient(circle,rgba(245,158,11,0.06),transparent);top:45%;left:55%}

    .glass{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.10);box-shadow:inset 0 1px 0 0 rgba(255,255,255,0.1)}

    .dock-zone{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:520px;height:36px;z-index:200}
    .dock-stage{position:absolute;bottom:10px;left:50%;transform:translateX(-50%) translateY(120%);opacity:0;transition:all 0.32s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;gap:3px;padding:6px 8px;background:rgba(255,255,255,0.07);backdrop-filter:blur(20px) saturate(180%);border:1px solid rgba(255,255,255,0.08);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 0 rgba(255,255,255,0.08)}
    .dock-zone:hover .dock-stage,.dock-stage:hover{transform:translateX(-50%) translateY(0);opacity:1}
    .dock-item{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.52);background:transparent;transition:all 0.18s ease;cursor:pointer;position:relative;font-size:18px}
    .dock-item:hover{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.90);transform:translateY(-5px) scale(1.12)}
    .dock-item.active{color:#f59e0b;background:rgba(245,158,11,0.12)}
    .dock-item.active::after{content:'';position:absolute;bottom:-5px;width:4px;height:4px;border-radius:50%;background:#f59e0b;box-shadow:0 0 8px rgba(245,158,11,0.5)}
    .dock-sep{width:1px;height:22px;background:rgba(255,255,255,0.10);margin:0 4px}

    .page-tab{height:30px;padding:0 14px;display:flex;align-items:center;gap:7px;border-radius:7px;font-size:13px;cursor:pointer;transition:all 0.15s;color:rgba(255,255,255,0.52);white-space:nowrap;max-width:200px;border:1px solid transparent}
    .page-tab:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.80)}
    .page-tab.active{background:rgba(245,158,11,0.10);color:rgba(255,255,255,0.90);border-color:rgba(245,158,11,0.25)}

    .scene-tab{padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,0.52);border-bottom:2px solid transparent;transition:all 0.15s;white-space:nowrap}
    .scene-tab:hover{color:rgba(255,255,255,0.80)}
    .scene-tab.active{color:#f59e0b;border-bottom-color:#f59e0b}

    .panel{background:rgba(255,255,255,0.025);border-radius:10px;border:1px solid rgba(255,255,255,0.06)}
    .card{padding:10px 12px;border-radius:8px;cursor:pointer;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);transition:all 0.15s;font-size:12px}
    .card:hover{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.05)}
    .card.sel{border-color:rgba(245,158,11,0.45);background:rgba(245,158,11,0.08)}

    .canvas-elt{position:absolute;cursor:move;border:1px solid transparent;transition:border-color 0.12s}
    .canvas-elt:hover{border-color:rgba(245,158,11,0.30)}
    .canvas-elt.selected{border-color:rgba(245,158,11,0.70)!important;box-shadow:0 0 0 2px rgba(245,158,11,0.20)}
    .resize-handle{position:absolute;width:8px;height:8px;background:#f59e0b;border:1px solid #0a0a0c;border-radius:2px;z-index:5}
    .handle-nw{top:-4px;left:-4px;cursor:nw-resize}
    .handle-ne{top:-4px;right:-4px;cursor:ne-resize}
    .handle-sw{bottom:-4px;left:-4px;cursor:sw-resize}
    .handle-se{bottom:-4px;right:-4px;cursor:se-resize}

    @keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
    .pulse{animation:pulse 2s ease-in-out infinite}
  </style>
</head>
<body>

<div id="app" v-cloak style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:10">

<div class="ambient-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

<!-- HEADER -->
<header style="height:48px;flex-shrink:0;display:flex;align-items:center;background:rgba(10,10,12,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.07);padding:0 12px;z-index:50">
  <div style="display:flex;align-items:center;gap:7px;margin-right:16px">
    <div style="width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,#f59e0b,#fbbf24);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#0a0a0c">智</div>
    <span style="font-size:14px;font-weight:600">智岩 AI</span>
  </div>
  <div style="display:flex;align-items:center;gap:3px;flex:1;overflow-x:auto;height:48px">
    <div v-for="t in tabs" :key="t.id" class="page-tab" :class="{active:activeTab===t.id}" @click="activeTab=t.id">
      <span v-text="t.icon"/>
      <span style="overflow:hidden;text-overflow:ellipsis" v-text="t.title"/>
      <span @click.stop="closeTab(t.id)" style="margin-left:2px;font-size:10px;opacity:0.5;cursor:pointer;width:14px;height:14px;display:flex;align-items:center;justify-content:center;border-radius:3px" class="hover:bg-white/10">✕</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;font-size:12px;color:rgba(255,255,255,0.42)">
    <span @click="showHelp=!showHelp" style="cursor:pointer">💡 指引</span>
    <div style="width:26px;height:26px;border-radius:50%;background:rgba(245,158,11,0.15);display:flex;align-items:center;justify-content:center;font-size:12px;color:#f59e0b">W</div>
  </div>
</header>

<!-- CONTENT -->
<div style="flex:1;overflow:hidden;padding:8px 10px 10px">
<div class="glass" style="height:100%;border-radius:14px;display:flex;flex-direction:column;overflow:hidden">

  <!-- ========== SCENE GENERATION ========== -->
  <div v-if="activeTab==='scene'" style="flex:1;display:flex;flex-direction:column;overflow:hidden">

    <!-- Top Scene Tabs -->
    <div style="flex-shrink:0;display:flex;align-items:center;gap:0;padding:6px 16px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
      <div v-for="st in sceneTabs" :key="st.key" class="scene-tab" :class="{active:sceneTab===st.key}" @click="switchSceneTab(st.key)" v-text="st.label"/>
      <span v-if="sceneTab!=='assets'" style="margin-left:auto;font-size:11px;color:rgba(255,255,255,0.25);padding-bottom:8px" v-text="activeScene.specs"/>
    </div>

    <!-- ===== SCENE WORKSPACE ===== -->
    <template v-if="sceneTab!=='assets'">
      <div style="flex:1;display:flex;overflow:hidden">

        <!-- === LEFT: 素材源 === -->
        <div style="width:230px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;overflow:hidden">

          <!-- AI Generate -->
          <div style="padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.32);margin-bottom:6px">🤖 AI 生成 · 从零开始</div>
            <div style="display:flex;align-items:center;gap:3px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:3px">
              <input v-model="aiPrompt" placeholder="描述场景、产品、氛围..."
                @keyup.enter="runAI"
                style="flex:1;background:transparent;border:none;outline:none;font-size:12px;color:rgba(255,255,255,0.85);padding:5px 6px"/>
              <button @click="runAI" :disabled="!aiPrompt.trim() || aiRunning"
                :style="{padding:'5px 10px',borderRadius:'6px',border:'none',fontSize:'11px',fontWeight:600,cursor:aiPrompt.trim()&&!aiRunning?'pointer':'not-allowed',background:aiPrompt.trim()&&!aiRunning?'#f59e0b':'rgba(255,255,255,0.08)',color:aiPrompt.trim()&&!aiRunning?'#0a0a0c':'rgba(255,255,255,0.25)'}">{{aiRunning?'⏳':'生成'}}</button>
            </div>
            <div v-if="aiRunning" style="margin-top:5px;height:2px;background:rgba(255,255,255,0.06);border-radius:1px;overflow:hidden"><div class="pulse" style="height:100%;width:60%;background:#f59e0b;border-radius:1px"/></div>
          </div>

          <!-- Existing Material -->
          <div style="padding:10px;border-bottom:1px solid rgba(255,255,255,0.05)">
            <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.32);margin-bottom:6px">📤 已有素材 · 跳过生成</div>
            <div @click="addMaterial('上传的主视觉','本地上传')"
              style="padding:8px 10px;border-radius:7px;cursor:pointer;border:1.5px dashed rgba(255,255,255,0.10);background:rgba(255,255,255,0.01);text-align:center;font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:5px;transition:border-color 0.15s" class="hover:border-primary/30">🖼️ 上传本地文件</div>
            <div @click="showAssetPick=!showAssetPick"
              style="padding:8px 10px;border-radius:7px;cursor:pointer;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:rgba(255,255,255,0.45);transition:border-color 0.15s" class="hover:border-primary/30">
              <span>📦 从素材库选择</span><span style="font-size:9px;color:rgba(255,255,255,0.25)">→</span>
            </div>
            <!-- Quick asset picker -->
            <div v-if="showAssetPick" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-top:6px">
              <div v-for="a in sampleAssets.slice(0,6)" :key="a.id"
                @click="addMaterial(a.name,'素材库');showAssetPick=false"
                style="aspect-ratio:1;border-radius:5px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.25);transition:border-color 0.15s" class="hover:border-primary/30">🖼️</div>
            </div>
            <div @click="sceneTab='assets';showAssetPick=false" style="font-size:10px;color:#f59e0b;cursor:pointer;margin-top:5px;text-align:right">浏览全部素材 →</div>
          </div>

          <!-- Materials list -->
          <div style="flex:1;overflow:auto;padding:8px 10px">
            <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.26);margin-bottom:6px">🎨 已准备素材 ({{materials.length}})</div>
            <div v-for="(m,i) in materials" :key="i" class="card" :class="{sel:activeMat===i}" @click="activeMat=i"
              style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              <div style="width:32px;height:32px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🖼️</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:500;color:rgba(255,255,255,0.78);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" v-text="m.name"/>
                <div style="font-size:10px;color:rgba(255,255,255,0.28)" v-text="m.source"/>
              </div>
              <span @click.stop="materials.splice(i,1);if(activeMat>=materials.length)activeMat=Math.max(0,materials.length-1)" style="cursor:pointer;font-size:10px;color:rgba(255,255,255,0.18)" class="hover:text-red-400">✕</span>
            </div>
            <div v-if="materials.length===0" style="font-size:11px;color:rgba(255,255,255,0.15);text-align:center;padding:30px 10px">上传已有素材<br>或 AI 生成</div>
          </div>
        </div>

        <!-- === CENTER: 预览 / 编辑画板 === -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(0,0,0,0.20)">
          <div style="padding:8px 14px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.38);border-bottom:1px solid rgba(255,255,255,0.04);flex-shrink:0;display:flex;align-items:center;justify-content:space-between">
            <span>{{ editingOne ? '排版编辑 — 点击元素修改' : materials.length ? '素材预览 — 选中素材，在右侧输入信息后生成' : '等待添加素材' }}</span>
            <div style="display:flex;gap:4px;align-items:center">
              <template v-if="editingOne">
                <button @click="prevEdit" style="width:20px;height:20px;border:1px solid rgba(255,255,255,0.10);border-radius:4px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center">◀</button>
                <span style="font-size:10px;color:rgba(255,255,255,0.28)">{{editIdx+1}}/{{results.length}}</span>
                <button @click="nextEdit" style="width:20px;height:20px;border:1px solid rgba(255,255,255,0.10);border-radius:4px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center">▶</button>
              </template>
              <template v-if="!editingOne && materials.length>1">
                <button v-for="(_,i) in materials" :key="i" @click="activeMat=i" :style="{width:'16px',height:'16px',borderRadius:'4px',border:'1px solid',borderColor:activeMat===i?'rgba(245,158,11,0.6)':'rgba(255,255,255,0.12)',background:activeMat===i?'rgba(245,158,11,0.15)':'rgba(255,255,255,0.03)',cursor:'pointer',fontSize:'8px',display:'flex',alignItems:'center',justifyContent:'center',color:activeMat===i?'#f59e0b':'rgba(255,255,255,0.28)'}" v-text="i+1"/>
              </template>
            </div>
          </div>

          <div style="flex:1;overflow:auto;padding:20px;display:flex;align-items:center;justify-content:center">

            <!-- Preview (pre-generation) -->
            <div v-if="!editingOne && !results.length && materials.length"
              style="width:100%;max-width:600px;aspect-ratio:1;max-height:100%;position:relative;background:rgba(255,255,255,0.012);border-radius:10px;border:1px dashed rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:rgba(255,255,255,0.16)">
              <span style="font-size:36px">🖼️</span>
              <span style="font-size:12px">{{materials[activeMat]?.name||''}}</span>
              <span style="font-size:10px;color:rgba(255,255,255,0.10)">在右侧输入商品信息后生成效果图</span>
            </div>

            <!-- Results grid (review mode) -->
            <div v-if="!editingOne && results.length" style="width:100%">
              <div style="font-size:12px;font-weight:600;color:rgba(255,255,255,0.75);margin-bottom:12px">✅ 生成完成 — 请检查下列结果</div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px">
                <div v-for="(r,i) in results" :key="i" class="glass panel" style="overflow:hidden">
                  <div style="aspect-ratio:1;background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,0.08)">🖼️</div>
                  <div style="padding:10px">
                    <div style="font-size:12px;font-weight:500;color:rgba(255,255,255,0.75)" v-text="r.sizeName"/>
                    <div style="font-size:10px;color:rgba(255,255,255,0.32)" v-text="r.dimensions+' · '+r.lang"/>
                    <div style="display:flex;gap:6px;margin-top:8px">
                      <button @click="startEdit(i)" style="flex:1;padding:5px 0;border-radius:5px;border:1px solid rgba(245,158,11,0.25);background:rgba(245,158,11,0.08);color:#f59e0b;font-size:10px;cursor:pointer">✏️ 编辑</button>
                      <button style="flex:1;padding:5px 0;border-radius:5px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.45);font-size:10px;cursor:pointer">⬇ 下载</button>
                    </div>
                  </div>
                </div>
              </div>
              <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
                <button @click="results=[];editingOne=null" style="padding:8px 20px;border-radius:7px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.60);font-size:12px;cursor:pointer">🔄 重新生成</button>
                <button @click="saveResults" style="padding:8px 20px;border-radius:7px;border:none;background:#22c55e;color:#fff;font-size:12px;font-weight:600;cursor:pointer">💾 全部保存至素材库</button>
              </div>
            </div>

            <!-- Empty -->
            <div v-if="!editingOne && !results.length && !materials.length"
              style="width:100%;max-width:600px;aspect-ratio:1;max-height:100%;background:rgba(255,255,255,0.010);border-radius:10px;border:1px dashed rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.12)">
              <span style="font-size:40px">🎨</span>
              <span style="font-size:13px">从左侧上传或 AI 生成素材</span>
              <span style="font-size:11px">然后在右侧配置商品信息生成效果图</span>
            </div>

            <!-- EDITING CANVAS -->
            <div v-if="editingOne" style="width:100%;max-width:700px;height:100%;max-height:650px;position:relative;background:rgba(255,255,255,0.012);border-radius:10px;border:1px solid rgba(255,255,255,0.06);overflow:hidden" @mousedown="onCanvasBg">
              <div :style="{position:'absolute',background:'rgba(255,255,255,0.02)',...editingOne.layout.img,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px',color:'rgba(255,255,255,0.06)'}">🖼️</div>
              <div :style="{position:'absolute',border:'1px dashed rgba(245,158,11,0.18)',...editingOne.layout.safe,pointerEvents:'none'}"/>
              <div v-for="(el,ei) in editingOne.layout.els" :key="ei"
                class="canvas-elt" :class="{selected:selEl===ei}"
                :style="{left:el.x+'%',top:el.y+'%',width:el.w+'%',height:el.h+'%',zIndex:el.z||1,background:selEl===ei?'rgba(245,158,11,0.06)':'rgba(255,255,255,0.01)'}"
                @mousedown.stop="pickEl(ei,$event)" @dblclick.stop="dblEl(ei)">
                <!-- Text -->
                <div v-if="el.t==='text' && !el.ed" :style="{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:el.al==='center'?'center':'flex-start',fontSize:el.fs+'px',fontWeight:el.b?600:400,color:el.c||'rgba(255,255,255,0.88)',padding:'4px 8px',pointerEvents:'none'}" v-text="el.v"/>
                <input v-if="el.t==='text' && el.ed" v-model="el.v" @blur="el.ed=false" @keyup.enter="el.ed=false" :style="{width:'100%',height:'100%',background:'rgba(0,0,0,0.5)',border:'1px solid #f59e0b',borderRadius:'2px',outline:'none',fontSize:el.fs+'px',fontWeight:el.b?600:400,color:el.c||'rgba(255,255,255,0.88)',padding:'4px 8px',textAlign:el.al||'center'}"/>
                <!-- Logo -->
                <div v-if="el.t==='logo'" :style="{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',color:'rgba(255,255,255,0.25)',border:'1px dashed rgba(255,255,255,0.10)',borderRadius:'4px'}">LOGO</div>
                <!-- CTA -->
                <div v-if="el.t==='cta'" :style="{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'11px',background:el.bg||'rgba(245,158,11,0.18)',color:el.c||'#f59e0b',borderRadius:'4px',fontWeight:600}" v-text="el.v"/>
                <template v-if="selEl===ei">

    platforms:['Amazon','独立站','eBay','Amazon Ads','Google Ads','FB/IG Ads'],
    selSizes:[],layoutTpl:'默认版式',
    layoutTemplates:[{icon:'📋',name:'默认版式'},{icon:'🏷️',name:'促销版式'},{icon:'✨',name:'品牌A版式'},{icon:'🤍',name:'简约版式'}],
    langs:['EN'],extraReqs:'',
    // Results
    results:[],editingOne:null,editIdx:0,selEl:null,
    // Drag
    dragging:false,ds:{x:0,y:0},des:{x:0,y:0},rc:null,rs:null,
    // Assets
    sampleAssets:[
      {id:1,name:'落地灯_主图_0615',scene:'电商素材',creator:'平面设计师',date:'2026-06-15',sizeCount:6,status:'已定版'},
      {id:2,name:'三色灯_广告素材',scene:'广告投放素材',creator:'广告投放',date:'2026-06-14',sizeCount:4,status:'已定版'},
      {id:3,name:'窗帘灯_IG帖子',scene:'社媒素材',creator:'创意视觉',date:'2026-06-13',sizeCount:5,status:'已定版'},
      {id:4,name:'台灯_A+模块_新品',scene:'电商素材',creator:'平面设计师',date:'2026-06-12',sizeCount:6,status:'已定版'},
      {id:5,name:'洗墙灯_FB广告',scene:'广告投放素材',creator:'广告投放',date:'2026-06-11',sizeCount:4,status:'待审核'},
      {id:6,name:'屋檐灯_Banner',scene:'电商素材',creator:'平面设计师',date:'2026-06-10',sizeCount:6,status:'已定版'},
      {id:7,name:'氛围灯_TikTok封面',scene:'社媒素材',creator:'品牌运营',date:'2026-06-09',sizeCount:5,status:'待审核'},
      {id:8,name:'台灯_主图套系',scene:'电商素材',creator:'平面设计师',date:'2026-06-08',sizeCount:6,status:'已定版'},
    ],
    assetQ:'',assetScene:'',showHelp:false,
  }),

  computed:{
    activeScene(){return this.scenes[this.sceneTab]||this.scenes.ecommerce},
    filterAssets(){
      let l=[...this.sampleAssets];
      if(this.assetQ){const q=this.assetQ.toLowerCase();l=l.filter(a=>a.name.toLowerCase().includes(q)||a.creator.toLowerCase().includes(q))}
      if(this.assetScene)l=l.filter(a=>a.scene===this.assetScene);
      return l;
    },
  },

  methods:{
    closeTab(id){const i=this.tabs.findIndex(t=>t.id===id);if(i>-1)this.tabs.splice(i,1);if(this.activeTab===id)this.activeTab=this.tabs.length?this.tabs[Math.min(i,this.tabs.length-1)].id:'scene'},

    switchSceneTab(k){this.sceneTab=k;this.showAssetPick=false;this.results=[];this.editingOne=null;this.selEl=null;if(k!=='assets')this.selSizes=[...this.activeScene.sizeOptions]},

    addMaterial(n,s){this.materials.push({name:n,source:s,id:Date.now()});this.activeMat=this.materials.length-1},
    runAI(){if(!this.aiPrompt.trim()||this.aiRunning)return;this.aiRunning=true;setTimeout(()=>{this.aiRunning=false;this.addMaterial('AI: '+this.aiPrompt.slice(0,25)+'...','AI生成');this.aiPrompt=''},1500)},

    toggleSz(s){const f=this.selSizes.find(x=>x.name===s.name);if(f)this.selSizes=this.selSizes.filter(x=>x.name!==s.name);else this.selSizes.push(s)},
    toggleLang(l){if(this.langs.includes(l)){if(this.langs.length>1)this.langs=this.langs.filter(x=>x!==l)}else this.langs.push(l)},

    // Generate
    doGenerate(){
      if(!this.materials.length||!this.selSizes.length||!this.prodName.trim())return;
      const rs=[];
      this.selSizes.forEach(s=>{this.langs.forEach(l=>{
        rs.push({id:Date.now()+Math.random(),sizeName:s.name,dimensions:s.dimensions,lang:l,layout:mkLayout(this.sceneTab),layoutName:this.layoutTpl,mod:false});
      })});
      this.results=rs;this.editingOne=null;this.selEl=null;
    },

    // Edit
    startEdit(i){this.editIdx=i;this.editingOne=this.results[i];this.selEl=null},
    prevEdit(){if(this.editIdx>0)this.startEdit(this.editIdx-1)},
    nextEdit(){if(this.editIdx<this.results.length-1)this.startEdit(this.editIdx+1)},

    pickEl(i,e){this.selEl=i;const el=this.editingOne.layout.els[i];this.dragging=true;this.ds={x:e.clientX,y:e.clientY};this.des={x:el.x,y:el.y}},
    dblEl(i){const el=this.editingOne.layout.els[i];if(el.t==='text'){this.selEl=i;el.ed=true}},
    rsz(i,cr,e){e.stopPropagation();e.preventDefault();this.selEl=i;this.rc=cr;const el=this.editingOne.layout.els[i];this.rs={x:e.clientX,y:e.clientY,w:el.w,h:el.h,x:el.x,y:el.y}},
    onCanvasBg(e){if(e.target===e.currentTarget)this.selEl=null},

    resetLayout(){this.editingOne.layout=mkLayout(this.sceneTab);this.editingOne.mod=true;this.selEl=null},
    applyAll(){const s=JSON.parse(JSON.stringify(this.editingOne.layout));this.results.forEach(r=>{r.layout=JSON.parse(JSON.stringify(s));r.mod=true})},
    saveResults(){alert('✅ '+this.results.length+' 张效果图已保存至素材管理');this.results=[];this.editingOne=null},

    useAsset(a){const m={电商素材:'ecommerce',社媒素材:'social',广告投放素材:'ads'};this.sceneTab=m[a.scene]||'ecommerce';this.addMaterial(a.name,'素材库')},
  },

  mounted(){
    this.selSizes=[...this.activeScene.sizeOptions];
    document.addEventListener('mousemove',e=>{
      if(this.dragging&&this.selEl!==null&&this.editingOne){const el=this.editingOne.layout.els[this.selEl];const dx=(e.clientX-this.ds.x)/5,dy=(e.clientY-this.ds.y)/5;el.x=Math.max(0,Math.min(95,this.des.x+dx));el.y=Math.max(0,Math.min(95,this.des.y+dy));this.editingOne.mod=true}
      if(this.rc&&this.editingOne){const el=this.editingOne.layout.els[this.selEl];const dx=(e.clientX-this.rs.x)/5,dy=(e.clientY-this.rs.y)/5;if(this.rc.includes('e'))el.w=Math.max(5,this.rs.w+dx);if(this.rc.includes('w')){el.x=Math.max(0,this.rs.x+dx);el.w=Math.max(5,this.rs.w-dx)}if(this.rc.includes('s'))el.h=Math.max(3,this.rs.h+dy);if(this.rc.includes('n')){el.y=Math.max(0,this.rs.y+dy);el.h=Math.max(3,this.rs.h-dy)}this.editingOne.mod=true}
    });
    document.addEventListener('mouseup',()=>{this.dragging=false;this.rc=null});
  },
}).mount('#app');
</script>
</body>
</html>
